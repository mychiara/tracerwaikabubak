name: Supabase Keep Alive

on:
  schedule:
    # Berjalan setiap hari jam 05:00 UTC (13:00 WITA) untuk mencegah hibernasi Supabase gratis
    - cron: '0 5 * * *'
  workflow_dispatch: # Memungkinkan eksekusi manual dari tab Actions di GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          if [ -z "${{ secrets.VITE_SUPABASE_URL }}" ] || [ -z "${{ secrets.VITE_SUPABASE_ANON_KEY }}" ]; then
            echo "Error: VITE_SUPABASE_URL atau VITE_SUPABASE_ANON_KEY belum diatur di Secrets repository GitHub!"
            exit 1
          fi
          echo "Melakukan ping ke database Supabase..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X GET "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/alumni?select=id&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}")
          
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 204 ] || [ "$RESPONSE" -eq 206 ]; then
            echo "Berhasil! Supabase merespons dengan HTTP $RESPONSE"
          else
            echo "Gagal! Supabase merespons dengan HTTP $RESPONSE"
            exit 1
          fi
